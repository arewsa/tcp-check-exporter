# NOTES

# - listen_address is port only, host defaults to "0.0.0.0"
# - timeout and interval support suffixes: s (seconds), ms (milliseconds), m (minutes)
# - name is used as a label in the host_up metric
# - If target.timeout is not set, global probe.timeout is used